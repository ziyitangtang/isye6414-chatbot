<!DOCTYPE html>
<html>
<head>
    <title>ISYE 6414 Course Assistant</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
        }

        #response {
            margin-top: 25px;
            padding: 15px;
            border: 1px solid #ddd;
            background: #f9f9f9;
        }

    </style>
</head>

<body>

<h1>ISYE 6414 Course Assistant</h1>

<p>
Ask a question about course materials, GitHub setup,
course policies, or concepts.
</p>

<textarea
    id="question"
    placeholder="Enter your question..."
></textarea>

<br>

<button onclick="askQuestion()">
    Send
</button>

<div id="response"></div>

<script>

async function askQuestion() {

    const question =
        document.getElementById("question").value;

    document.getElementById("response").innerHTML =
        "Thinking...";

    const response = await fetch(
        "/chat",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                message: question
            })
        }
    );

    const data = await response.json();

    document.getElementById("response").innerHTML =
        data.answer;
}

</script>

</body>
</html>
